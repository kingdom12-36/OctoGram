name: Quick Compile Check

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  compile:
    name: Java compile only (no APK)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties (dummy credentials for compile check)
        run: |
          mkdir -p /home/runner/keys
          cat > /home/runner/keys/sign.properties << 'EOF'
          keyPath=/home/runner/keys/octogram-key.jks
          storePassword=dummy
          keyAlias=dummy
          keyPassword=dummy
          EOF
          {
            echo "sign.file=/home/runner/keys/sign.properties"
            echo "MAPS_API_KEY=AIzaSyDummyKey"
            echo "apiId=12345"
            echo "apiHash=dummyhash"
            echo "sentryDsn="
            echo "sdk.dir=$ANDROID_SDK_ROOT"
          } > local.properties
          echo "=== local.properties (no secrets) ==="
          cat local.properties

      - name: Compile Java sources (no APK)
        run: |
          chmod +x ./gradlew
          ./gradlew :TMessagesProj:compileDebugJava \
            --no-daemon \
            --no-build-cache \
            --rerun-tasks \
            -x lint \
            -x lintDebug
