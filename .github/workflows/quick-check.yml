name: Quick Compile Check

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  compile:
    name: Java compile only
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Compile Java sources (no APK)
        run: |
          chmod +x ./gradlew
          ./gradlew :TMessagesProj:compileDebugJava \
            --no-daemon \
            --build-cache \
            --parallel \
            -x lint \
            -x lintDebug \
            2>&1 | tee /tmp/compile.log | grep -E "error:|\.java:[0-9]+|BUILD (SUCCESSFUL|FAILED)|> Task|FAILED" | tail -100
          grep -c "error:" /tmp/compile.log && exit 1 || true

      - name: Show error count
        if: failure()
        run: |
          echo "=== ERRORS ==="
          grep "error:" /tmp/compile.log | head -50
