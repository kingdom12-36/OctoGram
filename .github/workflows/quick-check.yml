name: Quick Compile Check

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  compile:
    name: Java compile only (no APK)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Compile Java sources (no APK, no cache)
        run: |
          chmod +x ./gradlew
          ./gradlew :TMessagesProj:compileDebugJava \
            --no-daemon \
            --no-build-cache \
            --rerun-tasks \
            -x lint \
            -x lintDebug
