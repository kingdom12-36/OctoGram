        run: |
          APK=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" | grep -i universal | head -1)
          [ -z "$APK" ] && APK=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" | head -1)
          [ -z "$APK" ] && { echo "❌ No APK found"; exit 1; }
          cp "$APK" OctoGram-universal.apk
          ls -lh OctoGram-universal.apk

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-universal
          path: OctoGram-universal.apk
          retention-days: 7

  # ──────────────────────────────────────────────
  #  SMOKE TEST  (uses universal APK on emulator)
  # ──────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: build-universal
    continue-on-error: true

    steps:
      - name: Record smoke-test start timestamp
        run: echo "SMOKE_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Download universal APK artifact
        uses: actions/download-artifact@v4
        with:
          name: OctoGram-universal

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Write smoke-test script
        env:
          APP_PKG: ${{ needs.build-universal.outputs.app-pkg }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          PKG_VAL="${APP_PKG}"
          TOKEN_VAL="${SENTRY_AUTH_TOKEN}"
          cat > /tmp/smoke.sh << HEADER
          #!/usr/bin/env bash
          set -euo pipefail
          PKG="$PKG_VAL"
          SENTRY_TOKEN="$TOKEN_VAL"
          HEADER
          cat >> /tmp/smoke.sh << 'BODY'
          ADB="$ANDROID_HOME/platform-tools/adb"
          echo "━━━ SMOKE TEST — $PKG ━━━"
          $ADB install -r OctoGram-universal.apk
          echo "✅ APK installed"
          $ADB logcat -c
          $ADB logcat -b crash AndroidRuntime:E FATAL:E *:W > /tmp/smoke_logcat.txt 2>&1 &
          LOGCAT_PID=$!
          $ADB shell am start -n "$PKG/org.telegram.ui.LaunchActivity" \
            -a android.intent.action.MAIN -c android.intent.category.LAUNCHER
          echo "Launched — waiting 40s..."
          sleep 40
          ALIVE=$($ADB shell pidof "$PKG" 2>/dev/null | tr -d "[:space:]" || true)
          kill $LOGCAT_PID 2>/dev/null || true
          if [ -n "$ALIVE" ]; then
            echo "💚 Process alive (pid $ALIVE)"
          else
            echo "📛 Process dead"
            tail -80 /tmp/smoke_logcat.txt
            exit 1
          fi
          LOGCAT_CRASH=$(grep -c "FATAL EXCEPTION\|SIGSEGV\|Process.*died\|fatal signal" /tmp/smoke_logcat.txt 2>/dev/null || echo "0")
          LOGCAT_CRASH=$(echo "$LOGCAT_CRASH" | tr -d '[:space:]')
          if [ "${LOGCAT_CRASH}" -gt 0 ]; then
            echo "🔴 SMOKE FAILED — logcat crashes: ${LOGCAT_CRASH}"
            grep -E "FATAL|SIGSEGV|died" /tmp/smoke_logcat.txt | head -40
            exit 1
          fi
          echo "🟢 SMOKE PASSED"
          BODY
          chmod +x /tmp/smoke.sh

      - name: Run smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 12
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_3a
          ram-size: 2048M
          heap-size: 512M
          disk-size: 4096M
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          disable-animations: true
          script: bash /tmp/smoke.sh

      - name: Create GitHub Issues from new Sentry crashes
        if: always()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node - << 'EOF'
          const https = require('https');
          const SENTRY_TOKEN = process.env.SENTRY_AUTH_TOKEN;
          const GH_TOKEN    = process.env.GITHUB_TOKEN;
          const SMOKE_START = process.env.SMOKE_START || new Date(Date.now() - 30*60*1000).toISOString();
          const REPO        = 'kingdom12-36/OctoGram';
          const SENTRY_ORG  = 'sham-19';
          const SENTRY_PROJ = 'android';

          function req(hostname, path, method, body, headers) {
            return new Promise((res, rej) => {
              const json = body ? JSON.stringify(body) : null;
              const opts = { hostname, path, method: method||'GET',
                headers: { 'User-Agent':'sentry-gh-bot', ...headers,
                  ...(json ? {'Content-Type':'application/json','Content-Length':Buffer.byteLength(json)} : {}) }};
              const r = https.request(opts, resp => {
                let d = '';
                resp.on('data', c => d += c);
                resp.on('end', () => { try { res(JSON.parse(d)); } catch(e) { res(d); } });
              });
              r.on('error', rej);
              if (json) r.write(json);
              r.end();
            });
          }

          async function main() {
            console.log('Querying Sentry for crashes since', SMOKE_START);
            if (!SENTRY_TOKEN) { console.log('No SENTRY_AUTH_TOKEN — skipping'); return; }

            const issues = await req('sentry.io',
              '/api/0/projects/'+SENTRY_ORG+'/'+SENTRY_PROJ+'/issues/?query=firstSeen:>'+SMOKE_START+'&limit=50',
              'GET', null, { 'Authorization': 'Bearer '+SENTRY_TOKEN });

            if (!Array.isArray(issues)) {
              console.log('Sentry response:', JSON.stringify(issues).slice(0,200));
              return;
            }
            console.log('New Sentry issues:', issues.length);

            for (const issue of issues) {
              const id    = issue.id;
              const title = (issue.title||'Unknown crash').slice(0,120);
              const url   = 'https://sentry.io/organizations/'+SENTRY_ORG+'/issues/'+id+'/';

              // Deduplicate: search existing GH issues for this sentry-id
              const search = await req('api.github.com',
                '/search/issues?q=repo:'+REPO+'+label:sentry+in:body+sentry-id:'+id+'&per_page=1',
                'GET', null, { 'Authorization':'Bearer '+GH_TOKEN, 'Accept':'application/vnd.github.v3+json'});
              if ((search.total_count||0) > 0) {
                console.log('Already tracked: Sentry', id); continue;
              }

              const body = [
                '**New Sentry crash detected during smoke test**', '',
                '| Field | Value |', '|-------|-------|',
                '| Sentry ID | `'+id+'` |',
                '| First Seen | '+issue.firstSeen+' |',
                '| Occurrences | '+issue.count+' |',
                '| Culprit | `'+(issue.culprit||'unknown')+'` |', '',
                '[View in Sentry]('+url+')', '',
                '<!-- sentry-id:'+id+' -->'
              ].join('\n');

              const created = await req('api.github.com', '/repos/'+REPO+'/issues', 'POST',
                { title:'[Crash] '+title, body, labels:['sentry','crash'] },
                { 'Authorization':'Bearer '+GH_TOKEN, 'Accept':'application/vnd.github.v3+json'});
              console.log('Created GH Issue #'+(created.number||'?')+': '+title);
            }
          }
          main().catch(e => { console.error('Sentry step error (non-fatal):', e.message); });
          EOF

  # ──────────────────────────────────────────────────────
  #  DELIVER — runs once both builds succeed
  #  Sends arm64 APK to Telegram channel + GitHub Release
  # ──────────────────────────────────────────────────────
  deliver:
    runs-on: ubuntu-latest
    needs: [build-arm64, build-universal, smoke-test]
    if: always() && needs.build-arm64.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download arm64 APK artifact
        uses: actions/download-artifact@v4
        with:
          name: OctoGram-arm64

      - name: Send APK to Telegram Channel
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_CLIENT: ${{ secrets.TELEGRAM_CLIENT }}
          BUILD_PKG: ${{ needs.build-arm64.outputs.app-pkg }}
          BUILD_NUM: ${{ github.run_number }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
        run: |
          pip install telethon -q
          python3 - << PYEOF
          import os, asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          api_id   = int(os.environ['TELEGRAM_API_ID'])
          api_hash = os.environ['TELEGRAM_API_HASH']
          session  = os.environ['TELEGRAM_CLIENT']
          channel  = -1004457565242
          smoke    = os.environ.get('SMOKE_RESULT', '?')
          smoke_icon = '✅ passed' if smoke == 'success' else '⚠️ check logs'
          pkg      = os.environ.get('BUILD_PKG', 'unknown')
          num      = os.environ.get('BUILD_NUM', '?')
          caption  = f"**OctoGram Linkit — Build #{num}**\nPackage: {pkg}\nArch: arm64-v8a\nSmoke test: {smoke_icon}"
          async def main():
              async with TelegramClient(StringSession(session), api_id, api_hash) as client:
                  await client.send_file(channel, 'OctoGram-arm64.apk', caption=caption, force_document=True)
                  print('APK sent!')
          asyncio.run(main())
          PYEOF

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
        run: |
          SMOKE_ICON="✅ passed"
          [ "$SMOKE_RESULT" != "success" ] && SMOKE_ICON="⚠️ check logs"
          PKG="${{ needs.build-arm64.outputs.app-pkg }}"
          printf '## OctoGram Linkit — Build #%s\n\nPackage: `%s`\nCommit: `%s`\nSmoke test: %s\n\narch: arm64-v8a (fast track)' \
            "${{ github.run_number }}" "$PKG" "${{ github.sha }}" "$SMOKE_ICON" > release_notes.md
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest OctoGram-arm64.apk \
            --title "OctoGram Linkit — Build #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes-file release_notes.md \
            --latest
