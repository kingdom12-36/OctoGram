name: Build OctoGram (Auto-Key Factory)

on:
  workflow_dispatch: 
  push: 

permissions:
  contents: write
  secrets: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      - name: Checkout Submodules LFS Files
        run: |
          git submodule foreach --recursive 'git lfs pull'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Essential Tools
        run: |
          git lfs version
          sed --version
          wget --version

      - name: Stable Keystore & Signing Setup
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"

          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "--- Reusing saved keystore (consistent signature) ---"
            echo "$KEYSTORE_BASE64" | base64 -d > /home/octogram/keys/octogram-key.jks
          else
            echo "--- First run: generating keystore ---"
            keytool -genkey -v \
              -keystore /home/octogram/keys/octogram-key.jks \
              -alias $KEY_NAME \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -storepass $PASSWORD \
              -keypass $PASSWORD \
              -dname "CN=${KEY_NAME}, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"

            echo "--- Saving keystore to GitHub Secrets for all future builds ---"
            base64 -w 0 /home/octogram/keys/octogram-key.jks | \
              gh secret set KEYSTORE_BASE64 --repo ${{ github.repository }}
            echo "Keystore saved! Future builds will reuse this exact key."
          fi

          echo "--- Writing signing.properties ---"
          {
            echo "storePassword=$PASSWORD"
            echo "keyAlias=$KEY_NAME"
            echo "keyPath=/home/octogram/keys/octogram-key.jks"
            echo "keyPassword=$PASSWORD"
          } > /home/octogram/keys/signing.properties

      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: "org.linkit.tgx"
          APP_NAME: "AyuGramX-Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dlx"
          APP_SOURCES_URL: "https://github.com/moeCrafters/moeGramX"
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          echo '#!/bin/bash' > /home/runner/bin/tput
          echo 'exit 0' >> /home/runner/bin/tput
          chmod +x /home/runner/bin/tput

          export PATH=/home/runner/bin:$PATH

          echo "sign.file=/home/octogram/keys/signing.properties" > local.properties

          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          if [ -z "$MAPS_KEY" ]; then
            MAPS_KEY="AIzaSyDummyKey_Linkit"
          fi
          echo "MAPS_API_KEY=$MAPS_KEY" >> local.properties

          if [ -d "scripts" ]; then
             ./scripts/setup.sh || true
          fi

      - name: Patch Google Services Package Name
        run: |
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ -f "$TARGET_JSON" ]; then
            echo "--- Patching google-services.json ---"
            sed -i 's/"package_name": "moe.kirao.mgx"/"package_name": "org.linkit.tgx"/g' $TARGET_JSON
            grep "package_name" $TARGET_JSON
          else
            echo "google-services.json not found, creating placeholder."
            mkdir -p TMessagesProj_App
            echo '{"modules":[{"id":"default"}]}' > $TARGET_JSON
          fi

      - name: Fix Deprecated Gradle Properties
        run: |
          if [ -f "gradle.properties" ]; then
            sed -i '/android.enableR8/d' gradle.properties
            echo "gradle.properties cleaned."
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Android App
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            -Pandroid.experimental.jetbrains.kotlin.jvm.target=21 \
            -Pandroid.antlr.arguments="-w" \
            -Dorg.gradle.project.android.ndk.cflags="-w" \
            -Dorg.gradle.project.android.ndk.cppflags="-w" \
            -Pandroid.injected.build.abi=arm64-v8a \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            --stacktrace

      - name: Locate & Stage APK
        run: |
          echo "=== Searching workspace for APKs ==="
          find . -name "*.apk" \
            -not -path "*/.gradle/*" \
            -not -path "*/tools/*" \
            -not -path "*/cache/*" \
            2>/dev/null | sort

          APK_PATH=$(find . -name "*.apk" \
            -not -path "*/.gradle/*" -not -path "*/tools/*" -not -path "*/cache/*" \
            2>/dev/null | grep -i "release" | grep -i "arm64" | head -1)

          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" \
              -not -path "*/.gradle/*" -not -path "*/tools/*" -not -path "*/cache/*" \
              2>/dev/null | grep -i "release" | head -1)
          fi

          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" \
              -not -path "*/.gradle/*" -not -path "*/tools/*" -not -path "*/cache/*" \
              2>/dev/null | head -1)
          fi

          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" OctoGram-arm64.apk
            echo "Staged: $APK_PATH -> OctoGram-arm64.apk"
            ls -lh OctoGram-arm64.apk
          else
            echo "ERROR: No APK found anywhere in workspace!"
            exit 1
          fi

      - name: Upload APK as Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-arm64
          path: OctoGram-arm64.apk
          retention-days: 30

      - name: Send APK to Telegram Channel
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_CLIENT: ${{ secrets.TELEGRAM_CLIENT }}
        run: |
          pip install pyrogram tgcrypto -q
          python3 << 'PYEOF'
          import os, asyncio
          from pyrogram import Client

          api_id   = int(os.environ["TELEGRAM_API_ID"])
          api_hash = os.environ["TELEGRAM_API_HASH"]
          session  = os.environ["TELEGRAM_CLIENT"]
          channel  = -1004457565242

          caption = (
              "**OctoGram Latest Build**\n"
              "Architecture: arm64-v8a\n"
              "Built automatically via GitHub Actions"
          )

          async def main():
              async with Client(":memory:", api_id=api_id, api_hash=api_hash, session_string=session) as app:
                  await app.send_document(
                      chat_id=channel,
                      document="OctoGram-arm64.apk",
                      caption=caption,
                      force_document=True
                  )
                  print("APK sent to Telegram channel successfully!")

          asyncio.run(main())
          PYEOF

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '## OctoGram Latest Auto-Build\n\nCommit: %s\n\narm64-v8a only - download APK below.' "${{ github.sha }}" > release_notes.md
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest OctoGram-arm64.apk \
            --title "Latest Build ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes-file release_notes.md \
            --latest
