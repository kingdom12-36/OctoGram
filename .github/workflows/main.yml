name: Build OctoGram (Auto-Key Factory)

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      apk-name: ${{ steps.stage.outputs.apk-name }}
      app-pkg: ${{ steps.patch.outputs.app-pkg }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      - name: Checkout Submodules LFS Files
        run: git submodule foreach --recursive 'git lfs pull'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle (Safe Cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success
          gradle-home-cache-includes: |
            caches/modules-2
            caches/transforms-3
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/journal-*
            caches/configuration-cache

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Essential Tools
        run: |
          git lfs version
          sed --version

      - name: Linkit Key Factory
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass $PASSWORD -keypass $PASSWORD \
            -dname "CN=Linkit, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"

      - name: Patch Package Name & ABI (arm64 + x86_64)
        id: patch
        run: |
          # Fixed package name — required for Firebase/FCM notifications to work consistently.
          # A run-number suffix would mean Firebase re-registration every build → broken notifications.
          PKG="org.linkit.octogram"
          echo "Package for this build: $PKG"
          sed -i "s/^APP_PACKAGE=.*/APP_PACKAGE=$PKG/" gradle.properties
          grep APP_PACKAGE gradle.properties
          sed -i "s/include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'/include 'arm64-v8a', 'x86_64'/" TMessagesProj_App/build.gradle
          sed -i 's/include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"/include "arm64-v8a", "x86_64"/' TMessagesProj_App/build.gradle
          echo "APP_PKG=$PKG" >> $GITHUB_ENV
          echo "app-pkg=$PKG" >> $GITHUB_OUTPUT

      - name: Generate google-services.json
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          TARGET_JSON="TMessagesProj_App/google-services.json"
          mkdir -p "$(dirname "$TARGET_JSON")"
          # Inline generation — package_name is always $APP_PKG so processReleaseGoogleServices never mismatches.
          # Firebase project: imado-508bc (your project).
          # NOTE: For full FCM push notifications, add org.linkit.octogram to Firebase Console
          #       (Project Settings → Your apps → Add app) and update mobilesdk_app_id below.
          cat > "$TARGET_JSON" << GSERVICES
          {
            "project_info": {
              "project_number": "384060997078",
              "project_id": "imado-508bc",
              "storage_bucket": "imado-508bc.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:384060997078:android:b390de6605a1fc7000f877",
                  "android_client_info": {
                    "package_name": "${APP_PKG}"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "${GOOGLE_API_KEY}"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSERVICES
          # Sanity: verify package matches
          grep -q "$APP_PKG" "$TARGET_JSON" \
            && echo "✅ google-services.json written — package: $APP_PKG" \
            || { echo "❌ package_name mismatch in google-services.json!"; cat "$TARGET_JSON"; exit 1; }

      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: ${{ env.APP_PKG }}
          APP_NAME: "OctoGram Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dl"
          APP_SOURCES_URL: "https://github.com/kingdom12-36/OctoGram"
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          printf '#!/bin/bash\nexit 0\n' > /home/runner/bin/tput
          chmod +x /home/runner/bin/tput
          export PATH=/home/runner/bin:$PATH
          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          [ -z "$MAPS_KEY" ] && MAPS_KEY="AIzaSyDummyKey_Linkit"
          # Create signing properties file (build.gradle reads "sign.file" → separate props file
          # with keyPath/storePassword/keyAlias/keyPassword, NOT from local.properties directly)
          cat > /home/octogram/keys/sign.properties << SIGNEOF
          keyPath=/home/octogram/keys/octogram-key.jks
          storePassword=Linkit
          keyAlias=Linkit
          keyPassword=Linkit
          SIGNEOF
          {
            echo "sign.file=/home/octogram/keys/sign.properties"
            echo "MAPS_API_KEY=$MAPS_KEY"
            echo "apiId=$TELEGRAM_API_ID"
            echo "apiHash=$TELEGRAM_API_HASH"
            echo "sentryDsn=$SENTRY_DSN"
          } > local.properties
          echo "=== local.properties (credentials redacted) ==="
          grep -v "apiId\|apiHash" local.properties
          echo "apiId=<set>" && echo "apiHash=<set>"
          [ -d "scripts" ] && ./scripts/setup.sh || true

      - name: Pre-Build Sanity Check
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          ERRORS=0
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PRE-BUILD SANITY CHECK"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -z "$TELEGRAM_API_ID" ]; then
            echo "❌ TELEGRAM_API_ID secret is not set"; ERRORS=$((ERRORS+1))
          elif ! echo "$TELEGRAM_API_ID" | grep -qE '^[0-9]+$'; then
            echo "❌ TELEGRAM_API_ID is not a valid integer"; ERRORS=$((ERRORS+1))
          elif [ "$TELEGRAM_API_ID" -eq 0 ]; then
            echo "❌ TELEGRAM_API_ID is 0 — native crash at launch"; ERRORS=$((ERRORS+1))
          else
            echo "✅ TELEGRAM_API_ID is set and non-zero"
          fi
          if [ -z "$TELEGRAM_API_HASH" ]; then
            echo "❌ TELEGRAM_API_HASH secret is not set"; ERRORS=$((ERRORS+1))
          elif ! echo "$TELEGRAM_API_HASH" | grep -qE '^[0-9a-fA-F]{32}$'; then
            echo "❌ TELEGRAM_API_HASH is not a 32-char hex string (len: ${#TELEGRAM_API_HASH})"; ERRORS=$((ERRORS+1))
          else
            echo "✅ TELEGRAM_API_HASH is set and looks valid"
          fi
          if [ ! -f "local.properties" ]; then
            echo "❌ local.properties not found"; ERRORS=$((ERRORS+1))
          else
            LOCAL_ID=$(grep "^apiId=" local.properties | cut -d= -f2)
            if [ -z "$LOCAL_ID" ] || [ "$LOCAL_ID" = "0" ]; then
              echo "❌ local.properties apiId is empty or 0"; ERRORS=$((ERRORS+1))
            else
              echo "✅ local.properties apiId is set"
            fi
            if ! grep -q "^apiHash=" local.properties || [ -z "$(grep "^apiHash=" local.properties | cut -d= -f2)" ]; then
              echo "❌ local.properties apiHash missing"; ERRORS=$((ERRORS+1))
            else
              echo "✅ local.properties apiHash is set"
            fi
          fi
          [ ! -f "/home/octogram/keys/octogram-key.jks" ] && { echo "❌ Keystore missing"; ERRORS=$((ERRORS+1)); } || echo "✅ Keystore exists"
          PKG_IN_GRADLE=$(grep "^APP_PACKAGE=" gradle.properties | cut -d= -f2)
          [ "$PKG_IN_GRADLE" = "it.octogram.android" ] && { echo "❌ APP_PACKAGE not patched — still default"; ERRORS=$((ERRORS+1)); } || echo "✅ APP_PACKAGE: $PKG_IN_GRADLE"
          GS_JSON="TMessagesProj_App/google-services.json"
          if [ ! -f "$GS_JSON" ]; then
            echo "❌ google-services.json missing"; ERRORS=$((ERRORS+1))
          elif ! grep -q "$PKG_IN_GRADLE" "$GS_JSON"; then
            echo "❌ google-services.json package_name does not match APP_PACKAGE ($PKG_IN_GRADLE)"; ERRORS=$((ERRORS+1))
          else
            echo "✅ google-services.json package matches APP_PACKAGE"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ "$ERRORS" -gt 0 ]; then
            echo "🚫 $ERRORS check(s) failed — aborting before wasting build time"
            exit 1
          else
            echo "🟢 All checks passed — proceeding to build"
          fi

      - name: Fix Gradle Properties
        run: |
          sed -i '/android.enableR8/d' gradle.properties || true
          echo 'android.enableR8.fullMode=true'                              >> gradle.properties
          echo 'android.injected.testOnly=false'                             >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC -Dfile.encoding=UTF-8' >> gradle.properties
          echo 'org.gradle.parallel=true'                                    >> gradle.properties
          echo 'org.gradle.daemon=false'                                     >> gradle.properties

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Enable Sentry Upload
        run: |
          echo 'sentry.autoUpload=true'                      >> gradle.properties
          echo 'sentry.uploadNativeSymbols=false'            >> gradle.properties
          echo 'sentry.includeSourceContext=false'           >> gradle.properties
          echo 'sentry.uploadProguardMapping=true'           >> gradle.properties
          echo 'sentry.tracingInstrumentation.enabled=false' >> gradle.properties
          echo "[Sentry] flags written:" && grep sentry gradle.properties

      - name: Build Android App
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: 'sham-19'
          SENTRY_PROJECT: 'android'
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            --no-configuration-cache \
            -Pandroid.injected.testOnly=false \
            -Pandroid.antlr.arguments="-w" \
            -Dorg.gradle.project.android.ndk.cflags="-w" \
            -Dorg.gradle.project.android.ndk.cppflags="-w" \
            --stacktrace

      - name: Locate & Stage APK
        id: stage
        run: |
          echo "=== All APKs built ==="
          find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | sort
          APK_ARM=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | grep -i "arm64" | grep -v "universal" | head -1)
          [ -z "$APK_ARM" ] && APK_ARM=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | grep -v "universal" | head -1)
          APK_UNI=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | grep -i "universal" | head -1)
          if [ -n "$APK_ARM" ]; then
            cp "$APK_ARM" OctoGram-arm64.apk
            echo "arm64 APK staged: $APK_ARM"
            ls -lh OctoGram-arm64.apk
            echo "apk-name=OctoGram-arm64.apk" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No arm64 APK found"; exit 1
          fi
          if [ -n "$APK_UNI" ]; then
            cp "$APK_UNI" OctoGram-universal.apk
          else
            cp OctoGram-arm64.apk OctoGram-universal.apk
          fi

      - name: Diagnose APK
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)"
          echo "=== FILE ===" && file OctoGram-arm64.apk && ls -lh OctoGram-arm64.apk
          echo "=== PACKAGE ===" && $BT/aapt dump badging OctoGram-arm64.apk 2>&1 | grep -E "package:|testOnly|native-code|sdkVersion" || true
          echo "=== SIGNATURE ===" && $BT/apksigner verify --verbose OctoGram-arm64.apk 2>&1 | head -5 || true

      - name: Upload APK as Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-arm64
          path: OctoGram-arm64.apk
          retention-days: 7

      - name: Upload Universal APK (for smoke test)
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-universal
          path: OctoGram-universal.apk
          retention-days: 7

  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - name: Download universal APK artifact
        uses: actions/download-artifact@v4
        with:
          name: OctoGram-universal

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Write smoke-test script
        env:
          APP_PKG: ${{ needs.build.outputs.app-pkg }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          PKG_VAL="${APP_PKG}"
          TOKEN_VAL="${SENTRY_AUTH_TOKEN}"
          cat > /tmp/smoke.sh << HEADER
          #!/usr/bin/env bash
          set -euo pipefail
          PKG="$PKG_VAL"
          SENTRY_TOKEN="$TOKEN_VAL"
          HEADER
          cat >> /tmp/smoke.sh << 'BODY'
          ADB="$ANDROID_HOME/platform-tools/adb"
          echo "━━━ SMOKE TEST — $PKG ━━━"
          $ADB install -r OctoGram-universal.apk
          echo "✅ APK installed"
          $ADB logcat -c
          $ADB logcat -b crash AndroidRuntime:E FATAL:E *:W > /tmp/smoke_logcat.txt 2>&1 &
          LOGCAT_PID=$!
          $ADB shell am start -n "$PKG/org.telegram.ui.LaunchActivity" \
            -a android.intent.action.MAIN -c android.intent.category.LAUNCHER
          echo "Launched — waiting 40s..."
          sleep 40
          ALIVE=$($ADB shell pidof "$PKG" 2>/dev/null | tr -d "[:space:]" || true)
          kill $LOGCAT_PID 2>/dev/null || true
          if [ -n "$ALIVE" ]; then
            echo "💚 Process alive (pid $ALIVE)"
          else
            echo "📛 Process dead"
            tail -80 /tmp/smoke_logcat.txt
            exit 1
          fi
          LOGCAT_CRASH=$(grep -c "FATAL EXCEPTION\|SIGSEGV\|Process.*died\|fatal signal" /tmp/smoke_logcat.txt 2>/dev/null || echo "0")
          LOGCAT_CRASH=$(echo "$LOGCAT_CRASH" | tr -d '[:space:]')
          if [ "${LOGCAT_CRASH}" -gt 0 ]; then
            echo "🔴 SMOKE FAILED — logcat crashes: ${LOGCAT_CRASH}"
            grep -E "FATAL|SIGSEGV|died" /tmp/smoke_logcat.txt | head -40
            exit 1
          fi
          echo "🟢 SMOKE PASSED"
          BODY
          chmod +x /tmp/smoke.sh

      - name: Run smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 12
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_3a
          ram-size: 2048M
          heap-size: 512M
          disk-size: 4096M
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          disable-animations: true
          script: bash /tmp/smoke.sh

  deliver:
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    if: always() && needs.build.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: OctoGram-arm64

      - name: Send APK to Telegram Channel
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_CLIENT: ${{ secrets.TELEGRAM_CLIENT }}
          BUILD_PKG: ${{ needs.build.outputs.app-pkg }}
          BUILD_NUM: ${{ github.run_number }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
        run: |
          pip install telethon -q
          python3 - << PYEOF
          import os, asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          api_id   = int(os.environ['TELEGRAM_API_ID'])
          api_hash = os.environ['TELEGRAM_API_HASH']
          session  = os.environ['TELEGRAM_CLIENT']
          channel  = -1004457565242
          smoke    = os.environ.get('SMOKE_RESULT', '?')
          smoke_icon = '✅ passed' if smoke == 'success' else '⚠️ check logs'
          pkg      = os.environ.get('BUILD_PKG', 'unknown')
          num      = os.environ.get('BUILD_NUM', '?')
          caption  = f"**OctoGram Linkit — Build #{num}**\nPackage: {pkg}\nArch: arm64-v8a + x86_64\nSmoke test: {smoke_icon}"
          async def main():
              async with TelegramClient(StringSession(session), api_id, api_hash) as client:
                  await client.send_file(channel, 'OctoGram-arm64.apk', caption=caption, force_document=True)
                  print('APK sent!')
          asyncio.run(main())
          PYEOF

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
        run: |
          SMOKE_ICON="✅ passed"
          [ "$SMOKE_RESULT" != "success" ] && SMOKE_ICON="⚠️ check logs"
          PKG="${{ needs.build.outputs.app-pkg }}"
          printf '## OctoGram Linkit — Build #%s\n\nPackage: `%s`\nCommit: `%s`\nSmoke test: %s\n\narch: arm64-v8a + x86_64.' \
            "${{ github.run_number }}" "$PKG" "${{ github.sha }}" "$SMOKE_ICON" > release_notes.md
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest OctoGram-arm64.apk \
            --title "OctoGram Linkit — Build #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes-file release_notes.md \
            --latest
