name: Build AyuGramX / moeGramX (Auto-Key Factory)

on:
  workflow_dispatch: 
  push: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب كود المشروع وتفعيل الـ LFS بشكل كامل وعميق للمشروع والـ Submodules
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      # 2. إجبار السيرفر على سحب ملفات الـ LFS من قلب الـ Submodules
      - name: Checkout Submodules LFS Files
        run: |
          git submodule foreach --recursive 'git lfs pull'

      # 3. إعداد بيئة جافا (المشروع يحتاج JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 4. إعداد الأندرويد SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 5. التحقق من الأدوات الأساسية المثبتة مسبقاً (تخطي apt بالكامل لتفادي التعليق العالق للشبكة)
      - name: Verify Essential Tools
        run: |
          echo "Checking essential pre-installed tools..."
          git lfs version
          sed --version
          wget --version

      # 6. مصنع مفاتيح لِنكيت الديناميكي طبقاً لـ OctoGram 🛡️
      - name: Linkit Key Factory & Properties Fix 🛡️
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          INFO_FILE="Linkit_Key_Info.txt"
          
          # إنشاء المجلد الصارم والمطلوب في مشروع OctoGram وتعديل صلاحياته
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          
          echo "--- Generating Keystore ---"
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass $PASSWORD \
            -keypass $PASSWORD \
            -dname "CN=${KEY_NAME}, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"

          echo "--- Creating Info File ---"
          {
            echo "Key Name/Alias: $KEY_NAME"
            echo "Password: $PASSWORD"
            echo "Format: JKS"
            echo "Generated Date: $(date)"
          } > $INFO_FILE

          echo "--- Generating signing.properties for OctoGram ---"
          {
            echo "storePassword=$PASSWORD"
            echo "keyAlias=$KEY_NAME"
            echo "keyPath=/home/octogram/keys/octogram-key.jks"
            echo "keyPassword=$PASSWORD"
          } > /home/octogram/keys/signing.properties

          echo "--- Generating Base64 String ---"
          base64 -w 0 /home/octogram/keys/octogram-key.jks > Linkit.jks.base64

      # 7. تشغيل سكربت الإعداد لتهيئة المكتبات وإنتاج الـ local.properties بالمسارات الصحيحة
      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: "org.linkit.tgx"
          APP_NAME: "AyuGramX-Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dlx"
          APP_SOURCES_URL: "https://github.com/moeCrafters/moeGramX"
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          echo '#!/bin/bash' > /home/runner/bin/tput
          echo 'exit 0' >> /home/runner/bin/tput
          chmod +x /home/runner/bin/tput
          
          export PATH=/home/runner/bin:$PATH
          
          # حقن المسارات المطلوبة في local.properties الأساسي للمشروع
          echo "sign.file=/home/octogram/keys/signing.properties" > local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties
          
          if [ -d "scripts" ]; then
             ./scripts/setup.sh || true
          fi

      # 8. تعديل اسم الحزمة داخل ملف google-services.json في المجلد الصحيح (TMessagesProj_App)
      - name: Patch Google Services Package Name
        run: |
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ -f "$TARGET_JSON" ]; then
            echo "--- Patching google-services.json ---"
            sed -i 's/"package_name": "moe.kirao.mgx"/"package_name": "org.linkit.tgx"/g' $TARGET_JSON
            grep "package_name" $TARGET_JSON
          else
            echo "google-services.json not found in TMessagesProj_App, creating an empty placeholder to prevent compile crash if needed."
            mkdir -p TMessagesProj_App
            echo '{"modules":[{"id":"default"}]}' > $TARGET_JSON
          fi

      # 9. إعطاء صلاحيات التنفيذ للـ Gradle Wrapper
      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # 10. البدء ببناء النسخة النهائية من الموديل الأب الحقيقي والوحيد للمشروع
      - name: Build Android App
        run: ./gradlew :TMessagesProj_App:assembleRelease --stacktrace

      # 11. رفع المفاتيح كـ Artifact لحفظها (لو احتجتها مستقبلاً)
      - name: Upload Keystore Package
        uses: actions/upload-artifact@v4
        with:
          name: Linkit-Release-Keys
          path: |
            Linkit_Key_Info.txt
            Linkit.jks.base64
          retention-days: 1

      # 12. رفع التطبيق النهائي الموقّع الملتقط ديناميكياً من مسارات الـ APK الصحيحة
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AyuGramX-Linkit-Official
          path: TMessagesProj_App/build/outputs/apk/**/*.apk
