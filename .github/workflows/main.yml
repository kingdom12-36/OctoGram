name: Build OctoGram (Auto-Key Factory)

on:
  workflow_dispatch: 
  push: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      - name: Checkout Submodules LFS Files
        run: |
          git submodule foreach --recursive 'git lfs pull'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Essential Tools
        run: |
          echo "Checking essential pre-installed tools..."
          git lfs version
          sed --version
          wget --version

      - name: Linkit Key Factory & Properties Fix
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          INFO_FILE="Linkit_Key_Info.txt"
          
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          
          echo "--- Generating Keystore ---"
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass $PASSWORD \
            -keypass $PASSWORD \
            -dname "CN=${KEY_NAME}, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"

          echo "--- Creating Info File ---"
          {
            echo "Key Name/Alias: $KEY_NAME"
            echo "Password: $PASSWORD"
            echo "Format: JKS"
            echo "Generated Date: $(date)"
          } > $INFO_FILE

          echo "--- Generating signing.properties for OctoGram ---"
          {
            echo "storePassword=$PASSWORD"
            echo "keyAlias=$KEY_NAME"
            echo "keyPath=/home/octogram/keys/octogram-key.jks"
            echo "keyPassword=$PASSWORD"
          } > /home/octogram/keys/signing.properties

          echo "--- Generating Base64 String ---"
          base64 -w 0 /home/octogram/keys/octogram-key.jks > Linkit.jks.base64

      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: "org.linkit.tgx"
          APP_NAME: "AyuGramX-Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dlx"
          APP_SOURCES_URL: "https://github.com/moeCrafters/moeGramX"
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          echo '#!/bin/bash' > /home/runner/bin/tput
          echo 'exit 0' >> /home/runner/bin/tput
          chmod +x /home/runner/bin/tput
          
          export PATH=/home/runner/bin:$PATH
          
          echo "sign.file=/home/octogram/keys/signing.properties" > local.properties
          
          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          if [ -z "$MAPS_KEY" ]; then
            MAPS_KEY="AIzaSyDummyKey_Linkit"
          fi
          echo "MAPS_API_KEY=$MAPS_KEY" >> local.properties
          
          if [ -d "scripts" ]; then
             ./scripts/setup.sh || true
          fi

      - name: Patch Google Services Package Name
        run: |
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ -f "$TARGET_JSON" ]; then
            echo "--- Patching google-services.json ---"
            sed -i 's/"package_name": "moe.kirao.mgx"/"package_name": "org.linkit.tgx"/g' $TARGET_JSON
            grep "package_name" $TARGET_JSON
          else
            echo "google-services.json not found, creating placeholder."
            mkdir -p TMessagesProj_App
            echo '{"modules":[{"id":"default"}]}' > $TARGET_JSON
          fi

      - name: Fix Deprecated Gradle Properties
        run: |
          if [ -f "gradle.properties" ]; then
            echo "--- Cleaning gradle.properties ---"
            sed -i '/android.enableR8/d' gradle.properties
            echo "Properties cleaned successfully."
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Android App
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            -Pandroid.experimental.jetbrains.kotlin.jvm.target=21 \
            -Pandroid.antlr.arguments="-w" \
            -Dorg.gradle.project.android.ndk.cflags="-w" \
            -Dorg.gradle.project.android.ndk.cppflags="-w" \
            -Pandroid.injected.build.abi=arm64-v8a \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            --stacktrace

      - name: List APK Output
        run: find TMessagesProj_App/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APKs found"

      - name: Rename APK
        run: |
          APK_PATH=$(find TMessagesProj_App/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" OctoGram-arm64.apk
            echo "APK copied to OctoGram-arm64.apk"
          fi

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f "OctoGram-arm64.apk" ]; then
            echo "No APK found — skipping release"
            exit 0
          fi
          # Delete old 'latest' release + tag if they exist
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          # Create fresh release tagged 'latest' with the APK attached
          gh release create latest OctoGram-arm64.apk \
            --title "Latest Build ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes "## OctoGram — Latest Auto-Build\n\nBuilt from commit ${{ github.sha }}\n\n**Download the APK below ⬇️**\n\n> arm64-v8a only" \
            --latest
