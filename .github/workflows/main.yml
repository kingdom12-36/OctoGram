        run: |
          sed -i '/android.enableR8/d' gradle.properties || true
          echo 'android.enableR8.fullMode=true'                              >> gradle.properties
          echo 'android.injected.testOnly=false'                             >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC -Dfile.encoding=UTF-8' >> gradle.properties
          echo 'org.gradle.parallel=true'                                    >> gradle.properties
          echo 'org.gradle.daemon=false'                                     >> gradle.properties

