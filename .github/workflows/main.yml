name: Build OctoGram (Auto-Key Factory)

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      - name: Checkout Submodules LFS Files
        run: git submodule foreach --recursive 'git lfs pull'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Essential Tools
        run: git lfs version && sed --version

      - name: Linkit Key Factory
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass $PASSWORD -keypass $PASSWORD \
            -dname "CN=Linkit, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"
          printf 'storePassword=%s\nkeyAlias=%s\nkeyPath=%s\nkeyPassword=%s\n' \
            "$PASSWORD" "$KEY_NAME" "/home/octogram/keys/octogram-key.jks" "$PASSWORD" \
            > /home/octogram/keys/signing.properties

      - name: Patch Package Name & ABI (arm64 + x86_64)
        run: |
          sed -i 's/^APP_PACKAGE=.*/APP_PACKAGE=org.linkit.octogram/' gradle.properties
          grep "APP_PACKAGE" gradle.properties
          # arm64 + x86_64: arm64 for delivery, x86_64 for emulator smoke test
          sed -i "s/include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'/include 'arm64-v8a', 'x86_64'/" TMessagesProj_App/build.gradle
          sed -i "s/include 'arm64-v8a'/include 'arm64-v8a', 'x86_64'/" TMessagesProj_App/build.gradle
          # Update package name in existing google-services.json
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ -f "$TARGET_JSON" ]; then
            sed -i 's/"package_name": "[^"]*"/"package_name": "org.linkit.octogram"/g' "$TARGET_JSON"
            echo "google-services.json updated for org.linkit.octogram"
          fi

      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: "org.linkit.octogram"
          APP_NAME: "OctoGram Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dl"
          APP_SOURCES_URL: "https://github.com/kingdom12-36/OctoGram"
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          printf '#!/bin/bash\nexit 0\n' > /home/runner/bin/tput
          chmod +x /home/runner/bin/tput
          export PATH=/home/runner/bin:$PATH
          echo "sign.file=/home/octogram/keys/signing.properties" > local.properties
          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          [ -z "$MAPS_KEY" ] && MAPS_KEY="AIzaSyDummyKey_Linkit"
          echo "MAPS_API_KEY=$MAPS_KEY" >> local.properties
          # Inject Sentry DSN so it bakes into BuildConfig
          [ -n "$SENTRY_DSN" ] && echo "SENTRY_DSN=$SENTRY_DSN" >> local.properties || true
          [ -d "scripts" ] && ./scripts/setup.sh || true

      - name: Fix Gradle Properties
        run: |
          [ -f "gradle.properties" ] && sed -i '/android.enableR8/d' gradle.properties || true

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Android App
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            -Pandroid.experimental.jetbrains.kotlin.jvm.target=21 \
            -Pandroid.antlr.arguments="-w" \
            -Dorg.gradle.project.android.ndk.cflags="-w" \
            -Dorg.gradle.project.android.ndk.cppflags="-w" \
            -Pandroid.injected.testOnly=false \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            --stacktrace

      - name: Upload ProGuard Mappings to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then echo "No SENTRY_AUTH_TOKEN — skip"; exit 0; fi
          curl -sL https://sentry.io/get-cli/ | bash -s -- 2>/dev/null || true
          MAPPING=$(find . -path "*/mapping/release/mapping.txt" 2>/dev/null | head -1)
          if [ -n "$MAPPING" ]; then
            sentry-cli releases --org sham-19 --project android files "build-$GITHUB_RUN_NUMBER" upload-proguard-mappings "$MAPPING" \
              --android-manifest $(find . -path "*/intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml" 2>/dev/null | head -1) || true
            echo "ProGuard mappings uploaded to Sentry"
          else
            echo "No mapping.txt found — R8 may be off"
          fi
      - name: Locate & Stage APKs
        id: stage
        run: |
          echo "=== All APKs built ==="
          find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | sort
          # arm64 → delivered to users
          APK_ARM=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | grep -i "arm64" | grep -v "x86" | head -1)
          [ -z "$APK_ARM" ] && APK_ARM=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | head -1)
          # x86_64 → smoke test on emulator
          APK_X86=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | grep -i "x86_64\|x86" | head -1)
          if [ -n "$APK_ARM" ]; then
            cp "$APK_ARM" OctoGram-arm64.apk
            echo "arm64: $APK_ARM ($(ls -lh OctoGram-arm64.apk | awk '{print $5}'))"
          else
            echo "ERROR: No arm64 APK found"; exit 1
          fi
          if [ -n "$APK_X86" ]; then
            cp "$APK_X86" OctoGram-x86_64.apk
            echo "x86_64: $APK_X86 ($(ls -lh OctoGram-x86_64.apk | awk '{print $5}'))"
          else
            echo "WARN: No x86_64 APK — using arm64 as smoke fallback"
            cp OctoGram-arm64.apk OctoGram-x86_64.apk
          fi

      - name: Diagnose APK
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)"
          echo "=== FILE ===" && file OctoGram-arm64.apk && ls -lh OctoGram-arm64.apk
          echo "=== PACKAGE ===" && $BT/aapt dump badging OctoGram-arm64.apk 2>&1 | grep -E "package:|testOnly|native-code|sdkVersion" || true
          echo "=== SIGNATURE ===" && $BT/apksigner verify --verbose OctoGram-arm64.apk 2>&1 | head -5 || true
          echo "=== LIBS ===" && unzip -l OctoGram-x86_64.apk | grep "\.so$" | head -10 || true

      - name: Upload arm64 APK (delivery)
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-arm64
          path: OctoGram-arm64.apk
          retention-days: 30

      - name: Upload x86_64 APK (smoke test)
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-x86_64
          path: OctoGram-x86_64.apk
          retention-days: 7

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.smoke.outcome }}

    steps:
      - name: Download x86_64 APK
        uses: actions/download-artifact@v4
        with:
          name: OctoGram-x86_64

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Write smoke script
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          PKG="org.linkit.octogram"
          ADB="$ANDROID_HOME/platform-tools/adb"
          cat > /tmp/smoke.sh << HEADER
          #!/bin/bash
          set -e
          PKG="$PKG"
          ADB="$ADB"
          SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN"
          HEADER
          cat >> /tmp/smoke.sh << 'BODY'
          echo "━━━ SMOKE TEST — $PKG ━━━"
          $ADB install -r OctoGram-x86_64.apk && echo "✅ APK installed" || { echo "❌ Install failed"; exit 1; }

          # Start logcat capturing crash + fatal lines
          $ADB logcat -c
          $ADB logcat -b crash AndroidRuntime:E FATAL:E *:W > /tmp/smoke_logcat.txt 2>&1 &

          EPOCH=$(date +%s)
          $ADB shell am start -n "$PKG/org.telegram.ui.LaunchActivity" \
            -a android.intent.action.MAIN -c android.intent.category.LAUNCHER
          echo "Launched — waiting 45s for app to settle..."
          sleep 45

          echo "━━━ Process status ━━━"
          ALIVE=$($ADB shell pidof "$PKG" 2>/dev/null | tr -d '[:space:]')
          if [ -n "$ALIVE" ]; then
            echo "✅ Process alive PID=$ALIVE"
          else
            echo "📛 Process dead — checking logcat"
            echo "━━━ Logcat (last 60 lines) ━━━"
            cat /tmp/smoke_logcat.txt | grep -v "^-" | tail -60 || true
            # Report crash to Sentry via API
            if [ -n "$SENTRY_AUTH_TOKEN" ]; then
              curl -sf -X POST "https://us.sentry.io/api/0/projects/sham-19/android/issues/" \
                -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"title":"OctoGram Smoke Test — Process died on emulator","culprit":"CI emulator smoke test","type":"error"}' \
                >/dev/null 2>&1 || true
            fi
            exit 1
          fi
          echo "🟢 SMOKE PASSED — process alive after 45s"
          BODY
          chmod +x /tmp/smoke.sh

      - name: Boot emulator + run smoke test
        id: smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          ram-size: 4096M
          disk-size: 8192M
          cores: 2
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          disable-animations: true
          script: bash /tmp/smoke.sh

  deliver:
    needs: [build, smoke-test]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'

    steps:
      - name: Download arm64 APK
        uses: actions/download-artifact@v4
        with:
          name: OctoGram-arm64

      - name: Send APK to Telegram Channel
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_CLIENT: ${{ secrets.TELEGRAM_CLIENT }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
        run: |
          pip install telethon -q
          SMOKE_ICON="✅ passed"
          [ "$SMOKE_RESULT" != "success" ] && SMOKE_ICON="⚠️ check logs"
          python3 - << PYEOF
          import os, asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          api_id   = int(os.environ['TELEGRAM_API_ID'])
          api_hash = os.environ['TELEGRAM_API_HASH']
          session  = os.environ['TELEGRAM_CLIENT']
          channel  = -1004457565242
          smoke    = os.environ.get('SMOKE_RESULT', '?')
          smoke_icon = '✅ passed' if smoke == 'success' else '⚠️ check logs'
          caption  = f"**OctoGram Linkit — Build #${{ github.run_number }}**\nPackage: org.linkit.octogram\nArch: arm64-v8a\nSmoke test: {smoke_icon}"
          async def main():
              async with TelegramClient(StringSession(session), api_id, api_hash) as client:
                  await client.send_file(channel, 'OctoGram-arm64.apk', caption=caption, force_document=True)
                  print('APK sent to Telegram!')
          asyncio.run(main())
          PYEOF

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
        run: |
          SMOKE_ICON="✅ passed"
          [ "$SMOKE_RESULT" != "success" ] && SMOKE_ICON="⚠️ check logs"
          printf '## OctoGram Linkit — Build #%s\n\nPackage: `org.linkit.octogram`\nCommit: `%s`\nSmoke test: %s\n\narch: arm64-v8a' \
            "${{ github.run_number }}" "${{ github.sha }}" "$SMOKE_ICON" > release_notes.md
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest OctoGram-arm64.apk \
            --title "OctoGram Linkit - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes-file release_notes.md \
            --latest
