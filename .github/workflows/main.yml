name: Build OctoGram (Auto-Key Factory)

on:
  workflow_dispatch:
  push:

permissions:
  contents: write
  issues: write

# ─── Shared setup anchors are not supported in GHA; steps are duplicated
# between build-arm64 and build-universal intentionally.  The only difference
# is the ABI filter in "Patch Package Name & ABI".

jobs:

  # ──────────────────────────────────────────────
  #  ARM64-ONLY — finishes in ~18 min
  #  Output: OctoGram-arm64.apk  (used by deliver)
  # ──────────────────────────────────────────────
  build-arm64:
    name: Build arm64-v8a (fast track)
    runs-on: ubuntu-latest
    outputs:
      app-pkg: ${{ steps.patch.outputs.app-pkg }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      - name: Checkout Submodules LFS Files
        run: git submodule foreach --recursive 'git lfs pull'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle (Safe Cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success
          gradle-home-cache-includes: |
            caches/modules-2
            caches/transforms-3
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/journal-*
            caches/configuration-cache

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Essential Tools
        run: |
          git lfs version
          sed --version

      - name: Linkit Key Factory
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass $PASSWORD -keypass $PASSWORD \
            -dname "CN=Linkit, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"

      - name: Patch Package Name & ABI (arm64-v8a only)
        id: patch
        run: |
          PKG="org.linkit.octogram"
          echo "Package for this build: $PKG"
          sed -i "s/^APP_PACKAGE=.*/APP_PACKAGE=$PKG/" gradle.properties
          grep APP_PACKAGE gradle.properties
          sed -i "s/include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'/include 'arm64-v8a'/" TMessagesProj_App/build.gradle
          sed -i 's/include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"/include "arm64-v8a"/' TMessagesProj_App/build.gradle
          echo "APP_PKG=$PKG" >> $GITHUB_ENV
          echo "app-pkg=$PKG" >> $GITHUB_OUTPUT

      - name: Generate google-services.json
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          TARGET_JSON="TMessagesProj_App/google-services.json"
          mkdir -p "$(dirname "$TARGET_JSON")"
          cat > "$TARGET_JSON" << GSERVICES
          {
            "project_info": {
              "project_number": "384060997078",
              "project_id": "imado-508bc",
              "storage_bucket": "imado-508bc.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:384060997078:android:b390de6605a1fc7000f877",
                  "android_client_info": {
                    "package_name": "${APP_PKG}"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "${GOOGLE_API_KEY}"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSERVICES
          grep -q "$APP_PKG" "$TARGET_JSON" \
            && echo "✅ google-services.json written" \
            || { echo "❌ package_name mismatch"; cat "$TARGET_JSON"; exit 1; }

      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: ${{ env.APP_PKG }}
          APP_NAME: "OctoGram Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dl"
          APP_SOURCES_URL: "https://github.com/kingdom12-36/OctoGram"
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          printf '#!/bin/bash\nexit 0\n' > /home/runner/bin/tput
          chmod +x /home/runner/bin/tput
          export PATH=/home/runner/bin:$PATH
          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          [ -z "$MAPS_KEY" ] && MAPS_KEY="AIzaSyDummyKey_Linkit"
          cat > /home/octogram/keys/sign.properties << SIGNEOF
          keyPath=/home/octogram/keys/octogram-key.jks
          storePassword=Linkit
          keyAlias=Linkit
          keyPassword=Linkit
          SIGNEOF
          {
            echo "sign.file=/home/octogram/keys/sign.properties"
            echo "MAPS_API_KEY=$MAPS_KEY"
            echo "apiId=$TELEGRAM_API_ID"
            echo "apiHash=$TELEGRAM_API_HASH"
            echo "sentryDsn=$SENTRY_DSN"
          } > local.properties
          grep -v "apiId\|apiHash" local.properties
          echo "apiId=<set>" && echo "apiHash=<set>"
          [ -d "scripts" ] && ./scripts/setup.sh || true

      - name: Pre-Build Sanity Check
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          ERRORS=0
          [ -z "$TELEGRAM_API_ID" ] && { echo "❌ TELEGRAM_API_ID not set"; ERRORS=$((ERRORS+1)); } || echo "✅ TELEGRAM_API_ID set"
          [ -z "$TELEGRAM_API_HASH" ] && { echo "❌ TELEGRAM_API_HASH not set"; ERRORS=$((ERRORS+1)); } || echo "✅ TELEGRAM_API_HASH set"
          [ ! -f "/home/octogram/keys/octogram-key.jks" ] && { echo "❌ Keystore missing"; ERRORS=$((ERRORS+1)); } || echo "✅ Keystore exists"
          PKG_IN_GRADLE=$(grep "^APP_PACKAGE=" gradle.properties | cut -d= -f2)
          [ "$PKG_IN_GRADLE" = "it.octogram.android" ] && { echo "❌ APP_PACKAGE not patched"; ERRORS=$((ERRORS+1)); } || echo "✅ APP_PACKAGE: $PKG_IN_GRADLE"
          [ "$ERRORS" -gt 0 ] && exit 1 || echo "🟢 All checks passed"

      - name: Fix Gradle Properties
        run: |
          sed -i '/android.enableR8/d' gradle.properties || true
          echo 'android.enableR8.fullMode=true'                              >> gradle.properties
          echo 'android.injected.testOnly=false'                             >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC -Dfile.encoding=UTF-8' >> gradle.properties
          echo 'org.gradle.parallel=true'                                    >> gradle.properties
          echo 'org.gradle.daemon=false'                                     >> gradle.properties

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Enable Sentry Upload
        run: |
          echo 'sentry.autoUpload=true'                      >> gradle.properties
          echo 'sentry.uploadNativeSymbols=false'            >> gradle.properties
          echo 'sentry.includeSourceContext=false'           >> gradle.properties
          echo 'sentry.uploadProguardMapping=true'           >> gradle.properties
          echo 'sentry.tracingInstrumentation.enabled=false' >> gradle.properties

      - name: Build Android App (arm64-v8a only)
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: 'sham-19'
          SENTRY_PROJECT: 'android'
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            --no-configuration-cache \
            -Pandroid.injected.testOnly=false \
            -Pandroid.antlr.arguments="-w" \
            -Dorg.gradle.project.android.ndk.cflags="-w" \
            -Dorg.gradle.project.android.ndk.cppflags="-w" \
            --stacktrace

      - name: Stage arm64 APK
        id: stage
        run: |
          APK=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" | grep -i arm64 | head -1)
          [ -z "$APK" ] && APK=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" | head -1)
          [ -z "$APK" ] && { echo "❌ No APK found"; exit 1; }
          cp "$APK" OctoGram-arm64.apk
          echo "apk-name=OctoGram-arm64.apk" >> $GITHUB_OUTPUT
          ls -lh OctoGram-arm64.apk

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-arm64
          path: OctoGram-arm64.apk
          retention-days: 7

  # ──────────────────────────────────────────────────────
  #  UNIVERSAL — runs in parallel, finishes in ~1 hr
  #  Output: OctoGram-universal.apk  (used by smoke-test)
  # ──────────────────────────────────────────────────────
  build-universal:
    name: Build universal (arm64 + x86_64)
    runs-on: ubuntu-latest
    outputs:
      app-pkg: ${{ steps.patch.outputs.app-pkg }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      - name: Checkout Submodules LFS Files
        run: git submodule foreach --recursive 'git lfs pull'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle (Safe Cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success
          gradle-home-cache-includes: |
            caches/modules-2
            caches/transforms-3
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/journal-*
            caches/configuration-cache

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Essential Tools
        run: |
          git lfs version
          sed --version

      - name: Linkit Key Factory
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass $PASSWORD -keypass $PASSWORD \
            -dname "CN=Linkit, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"

      - name: Patch Package Name & ABI (arm64 + x86_64)
        id: patch
        run: |
          PKG="org.linkit.octogram"
          echo "Package for this build: $PKG"
          sed -i "s/^APP_PACKAGE=.*/APP_PACKAGE=$PKG/" gradle.properties
          grep APP_PACKAGE gradle.properties
          sed -i "s/include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'/include 'arm64-v8a', 'x86_64'/" TMessagesProj_App/build.gradle
          sed -i 's/include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"/include "arm64-v8a", "x86_64"/' TMessagesProj_App/build.gradle
          echo "APP_PKG=$PKG" >> $GITHUB_ENV
          echo "app-pkg=$PKG" >> $GITHUB_OUTPUT

      - name: Generate google-services.json
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          TARGET_JSON="TMessagesProj_App/google-services.json"
          mkdir -p "$(dirname "$TARGET_JSON")"
          cat > "$TARGET_JSON" << GSERVICES
          {
            "project_info": {
              "project_number": "384060997078",
              "project_id": "imado-508bc",
              "storage_bucket": "imado-508bc.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:384060997078:android:b390de6605a1fc7000f877",
                  "android_client_info": {
                    "package_name": "${APP_PKG}"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "${GOOGLE_API_KEY}"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSERVICES
          grep -q "$APP_PKG" "$TARGET_JSON" \
            && echo "✅ google-services.json written" \
            || { echo "❌ package_name mismatch"; cat "$TARGET_JSON"; exit 1; }

      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: ${{ env.APP_PKG }}
          APP_NAME: "OctoGram Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dl"
          APP_SOURCES_URL: "https://github.com/kingdom12-36/OctoGram"
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          printf '#!/bin/bash\nexit 0\n' > /home/runner/bin/tput
          chmod +x /home/runner/bin/tput
          export PATH=/home/runner/bin:$PATH
          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          [ -z "$MAPS_KEY" ] && MAPS_KEY="AIzaSyDummyKey_Linkit"
          cat > /home/octogram/keys/sign.properties << SIGNEOF
          keyPath=/home/octogram/keys/octogram-key.jks
          storePassword=Linkit
          keyAlias=Linkit
          keyPassword=Linkit
          SIGNEOF
          {
            echo "sign.file=/home/octogram/keys/sign.properties"
            echo "MAPS_API_KEY=$MAPS_KEY"
            echo "apiId=$TELEGRAM_API_ID"
            echo "apiHash=$TELEGRAM_API_HASH"
            echo "sentryDsn=$SENTRY_DSN"
          } > local.properties
          grep -v "apiId\|apiHash" local.properties
          echo "apiId=<set>" && echo "apiHash=<set>"
          [ -d "scripts" ] && ./scripts/setup.sh || true

