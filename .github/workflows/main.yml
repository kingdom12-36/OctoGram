name: Build OctoGram (Auto-Key Factory)

on:
  workflow_dispatch: 
  push: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      - name: Checkout Submodules LFS Files
        run: |
          git submodule foreach --recursive 'git lfs pull'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Essential Tools
        run: |
          git lfs version
          sed --version
          wget --version

      - name: Linkit Key Factory & Properties Fix
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass $PASSWORD \
            -keypass $PASSWORD \
            -dname "CN=${KEY_NAME}, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"
          {
            echo "storePassword=$PASSWORD"
            echo "keyAlias=$KEY_NAME"
            echo "keyPath=/home/octogram/keys/octogram-key.jks"
            echo "keyPassword=$PASSWORD"
          } > /home/octogram/keys/signing.properties

      - name: Patch Package Name & Limit to arm64 Only
        run: |
          echo "--- Patching APP_PACKAGE in gradle.properties ---"
          sed -i 's/^APP_PACKAGE=.*/APP_PACKAGE=org.linkit.octogram/' gradle.properties
          grep "APP_PACKAGE" gradle.properties

          echo "--- Restricting ABI splits to arm64-v8a only in build.gradle ---"
          sed -i "s/include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'/include 'arm64-v8a'/" TMessagesProj_App/build.gradle
          grep "include" TMessagesProj_App/build.gradle || true

          echo "--- Patching google-services.json ---"
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ -f "$TARGET_JSON" ]; then
            sed -i 's/"package_name": "[^"]*"/"package_name": "org.linkit.octogram"/g' $TARGET_JSON
            grep "package_name" $TARGET_JSON
          fi

      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: "org.linkit.octogram"
          APP_NAME: "OctoGram Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dl"
          APP_SOURCES_URL: "https://github.com/kingdom12-36/OctoGram"
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          echo '#!/bin/bash' > /home/runner/bin/tput
          echo 'exit 0' >> /home/runner/bin/tput
          chmod +x /home/runner/bin/tput
          export PATH=/home/runner/bin:$PATH
          echo "sign.file=/home/octogram/keys/signing.properties" > local.properties
          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          if [ -z "$MAPS_KEY" ]; then MAPS_KEY="AIzaSyDummyKey_Linkit"; fi
          echo "MAPS_API_KEY=$MAPS_KEY" >> local.properties
          if [ -d "scripts" ]; then ./scripts/setup.sh || true; fi

      - name: Fix Deprecated Gradle Properties
        run: |
          if [ -f "gradle.properties" ]; then
            sed -i '/android.enableR8/d' gradle.properties
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Android App
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            -Pandroid.experimental.jetbrains.kotlin.jvm.target=21 \
            -Pandroid.antlr.arguments="-w" \
            -Dorg.gradle.project.android.ndk.cflags="-w" \
            -Dorg.gradle.project.android.ndk.cppflags="-w" \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            --stacktrace

      - name: Locate & Stage APK
        run: |
          echo "=== All APKs found in workspace ==="
          find . -name "*.apk" \
            -not -path "*/.gradle/*" \
            -not -path "*/tools/*" \
            -not -path "*/cache/*" \
            -not -path "*/intermediates/*" \
            2>/dev/null | sort

          echo "=== Picking from outputs/apk (signed final APKs) ==="
          APK_PATH=$(find . -path "*/outputs/apk*" -name "*.apk" \
            -not -path "*/.gradle/*" \
            2>/dev/null | grep -i "arm64" | head -1)

          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -path "*/outputs/apk*" -name "*.apk" \
              -not -path "*/.gradle/*" \
              2>/dev/null | head -1)
          fi

          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" OctoGram-arm64.apk
            echo "Staged: $APK_PATH -> OctoGram-arm64.apk"
            ls -lh OctoGram-arm64.apk
          else
            echo "ERROR: No signed APK in outputs/ folder!"
            exit 1
          fi

      - name: Diagnose APK
        run: |
          AAPT="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner"

          echo "====== FILE INFO ======"
          file OctoGram-arm64.apk
          ls -lh OctoGram-arm64.apk

          echo "====== PACKAGE INFO (aapt) ======"
          $AAPT dump badging OctoGram-arm64.apk | grep -E "package:|application-label|sdkVersion|targetSdkVersion|native-code" || echo "aapt failed"

          echo "====== SIGNATURE CHECK (apksigner) ======"
          $APKSIGNER verify --verbose OctoGram-arm64.apk 2>&1 || echo "apksigner check failed"

          echo "====== ZIP INTEGRITY ======"
          unzip -t OctoGram-arm64.apk > /dev/null 2>&1 && echo "ZIP is valid" || echo "ZIP is CORRUPT"

      - name: Upload APK as Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-arm64
          path: OctoGram-arm64.apk
          retention-days: 30

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '## OctoGram Linkit - Latest Build\n\nPackage: org.linkit.octogram\nCommit: %s\n\narm64-v8a only.' "${{ github.sha }}" > release_notes.md
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest OctoGram-arm64.apk \
            --title "OctoGram Linkit - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes-file release_notes.md \
            --latest
