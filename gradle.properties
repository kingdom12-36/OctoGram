# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for tweaking memory settings.
org.gradle.jvmargs=-Xmx8G -Dkotlin.daemon.jvm.options=-Xmx8G -Dfile.encoding=UTF-8
# When configured, Gradle will run in incubating parallel mode.
# This option should only be used with decoupled projects. For more details, visit
# https://developer.android.com/r/tools/gradle-multi-project-decoupled-projects
android.useAndroidX=true
android.enableJetifier=false
android.enableAppCompileTimeRClass=true
org.gradle.parallel=true
org.gradle.daemon=false

APP_VERSION_NAME=3.4.3
APP_VERSION_CODE=3783
APP_PACKAGE=it.octogram.android
kapt.incremental.apt=true
kotlin.code.style=official

TELEGRAM_VERSION_NAME=12.2.6
TELEGRAM_VERSION_CODE=6318
IS_PRIVATE=false

android.nonTransitiveRClass=false
android.nonFinalResIds=false
android.enableR8.fullMode=true
